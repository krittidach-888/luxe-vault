<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0a;--sf:#141412;--sf2:#1c1c19;--sf3:#242420;--gd:#c9a84c;--gdl:#e4c97e;--gdm:rgba(201,168,76,.12);--tx:#e8e4da;--txm:#7a7670;--txs:#a8a49a;--bd:#262620;--bdl:#2e2e28;--red:#e05252;--grn:#52c07a;--blu:#5294c0;--org:#c08050;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Sarabun',sans-serif;font-weight:300;min-height:100vh;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--sf);}::-webkit-scrollbar-thumb{background:var(--bdl);border-radius:3px;}

/* SETUP */
#setup{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
.sbox{background:var(--sf);border:1px solid var(--bdl);border-radius:16px;padding:36px;max-width:540px;width:100%;}
.slogo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gd);letter-spacing:5px;margin-bottom:4px;}
.ssub{font-size:13px;color:var(--txm);margin-bottom:22px;}
.urow label{display:block;font-size:11px;color:var(--txm);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
#api-url{width:100%;background:var(--sf2);border:1px solid var(--bdl);color:var(--tx);font-family:'Sarabun',sans-serif;font-size:13px;padding:10px 13px;border-radius:8px;outline:none;}
#api-url:focus{border-color:var(--gd);}
#smsg{font-size:12px;margin-top:8px;min-height:16px;}
.sbtns{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap;}

/* HEADER */
header{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--gd);letter-spacing:5px;}
.logo-sub{font-size:10px;color:var(--txm);letter-spacing:2px;}
nav{display:flex;gap:2px;}
.nb{background:none;border:none;color:var(--txm);font-family:'Sarabun',sans-serif;font-size:13px;padding:7px 12px;cursor:pointer;border-radius:7px;transition:all .2s;display:flex;align-items:center;gap:5px;}
.nb:hover{color:var(--tx);background:var(--sf2);}.nb.active{color:var(--gd);background:var(--gdm);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:5px;}
.sdot.spin{background:var(--org);animation:bl 1s infinite;}.sdot.err{background:var(--red);}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:.3;}}
.slbl{font-size:11px;color:var(--txm);}

/* LAYOUT */
main{padding:22px 20px;max-width:1440px;margin:0 auto;}
.sec{display:none;animation:fi .2s ease;}.sec.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;}}
.pt{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;}
.pt h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--gdl);}
.cnt{font-size:11px;color:var(--txm);background:var(--sf2);padding:3px 10px;border-radius:20px;}

/* STAT CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gd),transparent);}
.sl{font-size:11px;color:var(--txm);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.sv{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gd);line-height:1;}
.ss{font-size:11px;color:var(--txm);margin-top:4px;}
.sg{color:var(--grn)!important;}.sr{color:var(--red)!important;}

/* TOOLBAR */
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.tbl{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

/* INPUTS */
input,select,textarea{background:var(--sf2);border:1px solid var(--bdl);color:var(--tx);font-family:'Sarabun',sans-serif;font-size:13px;padding:8px 11px;border-radius:7px;outline:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--gd);}
select option{background:var(--sf2);}.sb{width:200px;}

/* BUTTONS */
.btn{padding:8px 15px;border-radius:7px;border:none;font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.bg{background:var(--gd);color:#0c0c0a;font-weight:600;}.bg:hover{background:var(--gdl);}
.bgh{background:none;border:1px solid var(--bdl);color:var(--txs);}.bgh:hover{border-color:var(--gd);color:var(--gd);}
.bd2{background:none;border:none;color:var(--red);font-size:12px;padding:3px 7px;opacity:.6;cursor:pointer;border-radius:4px;}.bd2:hover{opacity:1;background:rgba(224,82,82,.1);}
.be2{background:none;border:none;color:var(--blu);font-size:12px;padding:3px 7px;opacity:.6;cursor:pointer;border-radius:4px;}.be2:hover{opacity:1;background:rgba(82,148,192,.1);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* TABLE */
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.ts{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:600px;}
thead tr{background:var(--sf2);}
th{text-align:left;padding:10px 13px;font-size:11px;font-weight:500;color:var(--txm);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--bd);white-space:nowrap;}
td{padding:11px 13px;font-size:13px;border-bottom:1px solid var(--bd);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,.015);}
.tda{display:flex;gap:1px;}

/* BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.ba{background:rgba(82,192,122,.15);color:var(--grn);}
.bs{background:rgba(201,168,76,.15);color:var(--gd);}
.br2{background:rgba(82,148,192,.15);color:var(--blu);}
.bw{background:rgba(192,128,80,.18);color:var(--org);}

/* BRAND CHIPS */
.chip{display:inline-block;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px;}
.cc{background:#1a1a1a;color:#e8e4da;border:1px solid #333;}.cl{background:#6b3a2a;color:#f5c97a;}
.ch2{background:#c45c2a;color:#fff;}.cg2{background:#1a3a1a;color:#8fba8f;}
.cd{background:#2a2a3a;color:#9a9abf;}.crx{background:#1a3a2a;color:#6fbf8f;}
.cp{background:#1a1a1a;color:#c8c8c8;}.ce{background:#2a2a1a;color:#c8c870;}
.cx{background:var(--sf3);color:var(--txs);}

/* STALE */
.stale td{background:rgba(192,128,80,.04)!important;}
.sdoti{display:inline-block;width:6px;height:6px;background:var(--org);border-radius:50%;margin-right:5px;vertical-align:middle;}

/* EMPTY */
.empty{padding:48px 20px;text-align:center;color:var(--txm);}
.ei{font-size:32px;margin-bottom:10px;opacity:.5;}

/* CHANNEL CARDS */
.chgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:11px;margin-bottom:18px;}
.chc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;}
.chn{font-size:11px;color:var(--txm);margin-bottom:4px;}
.chp{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--grn);}
.chct{font-size:11px;color:var(--txm);margin-top:2px;}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center;padding:16px;}
.ov.open{display:flex;}
.modal{background:var(--sf);border:1px solid var(--bdl);border-radius:14px;padding:24px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;}
.mt2{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--gdl);margin-bottom:18px;font-weight:300;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fm label{display:block;font-size:11px;color:var(--txm);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;}
.fm.full{grid-column:1/-1;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* MOBILE */
.mnav{display:none;background:var(--sf);border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:100;padding:5px 8px;}
.mni{display:flex;justify-content:space-around;}
.mb2{background:none;border:none;color:var(--txm);font-family:'Sarabun',sans-serif;font-size:11px;padding:5px 8px;cursor:pointer;border-radius:7px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mb2.active{color:var(--gd);}.mi{font-size:19px;}

@media(max-width:700px){
  .dnav{display:none;}.mnav{display:block;}
  main{padding:14px 12px 80px;}.fg{grid-template-columns:1fr;}
  .sb{width:145px;}.cg{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
<div class="sbox">
  <div class="slogo">LUXE VAULT</div>
  <div class="ssub">วาง URL จาก Google Apps Script เพื่อเริ่มใช้งาน</div>
  <div class="urow">
    <label>Web App URL จาก Apps Script</label>
    <input type="text" id="api-url" placeholder="https://script.google.com/macros/s/AKfy...">
  </div>
  <div id="smsg"></div>
  <div class="sbtns">
    <button class="btn bg" onclick="testSave()">✅ ทดสอบและบันทึก</button>
    <button class="btn bgh" style="font-size:12px" onclick="skipSetup()">ข้ามก่อน</button>
    <button class="btn bgh" style="font-size:12px" onclick="resetURL()">🔄 เปลี่ยน URL</button>
  </div>
</div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
<header>
  <div><div class="logo">LUXE VAULT</div><div class="logo-sub">ระบบจัดการร้าน</div></div>
  <nav class="dnav">
    <button class="nb active" onclick="go('db',this)">📊 ภาพรวม</button>
    <button class="nb" onclick="go('stock',this)">👜 สต็อก</button>
    <button class="nb" onclick="go('buy',this)">🛒 ซื้อเข้า</button>
    <button class="nb" onclick="go('sell',this)">💳 ขายออก</button>
    <button class="nb" onclick="go('cust',this)">👤 ลูกค้า</button>
  </nav>
  <div style="display:flex;align-items:center;gap:10px">
    <div><span class="sdot" id="dot"></span><span class="slbl" id="lbl">กำลังโหลด...</span></div>
    <button class="btn bgh" style="font-size:12px;padding:5px 10px" onclick="loadAll()">↻</button>
    <button class="btn bgh" style="font-size:12px;padding:5px 10px" onclick="resetURL()">⚙️</button>
  </div>
</header>
<main>

<div id="s-db" class="sec active">
  <div class="pt"><h1>ภาพรวมร้าน</h1></div>
  <div class="cg" id="db-c"><div style="color:var(--txm);font-size:13px">กำลังโหลด...</div></div>
  <div class="chgrid" id="db-ch"></div>
  <div class="tc">
    <div style="padding:12px 16px;border-bottom:1px solid var(--bd)"><span style="font-size:13px;color:var(--txs)">⚠️ สินค้าค้างสต็อก >60 วัน</span></div>
    <div id="db-st"></div>
  </div>
</div>

<div id="s-stock" class="sec">
  <div class="pt"><h1>สต็อกสินค้า</h1><span class="cnt" id="ct-stock">-</span></div>
  <div class="tb">
    <div class="tbl">
      <input type="text" class="sb" placeholder="🔍 ชื่อ, Brand, Serial..." oninput="renderStock()">
      <select style="width:125px" onchange="renderStock()" id="fb"><option value="">ทุก Brand</option></select>
      <select style="width:108px" onchange="renderStock()" id="fst"><option value="">ทุกสถานะ</option><option value="available">มีสินค้า</option><option value="reserved">จอง</option><option value="sold">ขายแล้ว</option></select>
    </div>
    <button class="btn bg" onclick="openBuy(null)">+ เพิ่มสินค้า</button>
  </div>
  <div class="tc"><div class="ts"><div id="t-stock"><div class="empty"><div class="ei">👜</div><p>กำลังโหลด...</p></div></div></div></div>
</div>

<div id="s-buy" class="sec">
  <div class="pt"><h1>ซื้อเข้า</h1><span class="cnt" id="ct-buy">-</span></div>
  <div class="tb">
    <input type="text" class="sb" placeholder="🔍 ค้นหา..." oninput="renderBuy()">
    <button class="btn bg" onclick="openBuy(null)">+ บันทึกซื้อเข้า</button>
  </div>
  <div class="tc"><div class="ts"><div id="t-buy"></div></div></div>
</div>

<div id="s-sell" class="sec">
  <div class="pt"><h1>ขายออก</h1><span class="cnt" id="ct-sell">-</span></div>
  <div class="tb">
    <div class="tbl">
      <input type="text" class="sb" placeholder="🔍 ค้นหา..." oninput="renderSell()">
      <select style="width:125px" onchange="renderSell()" id="fch"><option value="">ทุกช่องทาง</option><option>Live Boom</option><option>Luxsy</option><option>Whosale</option><option>Openchat</option><option>IG</option><option>หน้าร้าน</option></select>
    </div>
    <button class="btn bg" onclick="openSell()">+ บันทึกขาย</button>
  </div>
  <div class="tc"><div class="ts"><div id="t-sell"></div></div></div>
</div>

<div id="s-cust" class="sec">
  <div class="pt"><h1>ลูกค้า</h1><span class="cnt" id="ct-cust">-</span></div>
  <div class="tb">
    <input type="text" class="sb" placeholder="🔍 ชื่อ, เบอร์..." oninput="renderCust()">
    <button class="btn bg" onclick="openCust(null)">+ เพิ่มลูกค้า</button>
  </div>
  <div class="tc"><div class="ts"><div id="t-cust"></div></div></div>
</div>

</main>
<div class="mnav"><div class="mni">
  <button class="mb2 active" onclick="go('db',this)"><span class="mi">📊</span>ภาพรวม</button>
  <button class="mb2" onclick="go('stock',this)"><span class="mi">👜</span>สต็อก</button>
  <button class="mb2" onclick="go('buy',this)"><span class="mi">🛒</span>ซื้อเข้า</button>
  <button class="mb2" onclick="go('sell',this)"><span class="mi">💳</span>ขาย</button>
  <button class="mb2" onclick="go('cust',this)"><span class="mi">👤</span>ลูกค้า</button>
</div></div>
</div>

<!-- MODAL: BUY/EDIT -->
<div class="ov" id="ov-buy">
<div class="modal">
  <div class="mt2" id="buy-ttl">บันทึกสินค้าซื้อเข้า</div>
  <input type="hidden" id="buy-eid">
  <div class="fg">
    <div class="fm"><label>Brand *</label>
      <select id="b-brand"><option>Chanel</option><option>LV</option><option>Hermes</option><option>Gucci</option><option>Dior</option><option>Rolex</option><option>Prada</option><option>Celine</option><option>YSL</option><option>Fendi</option><option>Marc Jacobs</option><option>AMI</option><option>VCA</option><option>Goyard</option><option>MiuMiu</option><option>อื่นๆ</option></select>
    </div>
    <div class="fm"><label>ชื่อสินค้า *</label><input type="text" id="b-name" placeholder="เช่น Classic Flap Medium"></div>
    <div class="fm"><label>ประเภท</label>
      <select id="b-type"><option>Bag</option><option>Wallet</option><option>Belt</option><option>Bracelet</option><option>Earring</option><option>Necklace</option><option>Glasses</option><option>Sunglass</option><option>Shirt</option><option>นาฬิกา</option><option>SLG</option><option>อื่นๆ</option></select>
    </div>
    <div class="fm"><label>Size</label><input type="text" id="b-size" placeholder="Mini / Medium / 28"></div>
    <div class="fm"><label>สภาพ</label>
      <select id="b-cond"><option>Like New</option><option>Used in good</option><option>Used</option><option>New</option><option>Kept Unused</option></select>
    </div>
    <div class="fm"><label>% สภาพ</label>
      <select id="b-pct"><option>99%</option><option>98%</option><option>95%</option><option>90%</option><option>85%</option><option>80%</option><option>75%</option></select>
    </div>
    <div class="fm"><label>ปีผลิต</label><input type="text" id="b-year" placeholder="2024"></div>
    <div class="fm"><label>Serial No.</label><input type="text" id="b-serial" placeholder="Serial / Code"></div>
    <div class="fm"><label>สี</label><input type="text" id="b-color" placeholder="Black GHW"></div>
    <div class="fm"><label>อุปกรณ์</label>
      <select id="b-acc"><option>Full Set + Receipt</option><option>Full Set (No Rec.)</option><option>Full Set + Rec (Copy)</option><option>No Set</option><option>อื่นๆ</option></select>
    </div>
    <div class="fm"><label>ราคาทุน (฿) *</label><input type="number" id="b-cost" placeholder="0"></div>
    <div class="fm"><label>ราคาขาย (฿) *</label><input type="number" id="b-price" placeholder="0"></div>
    <div class="fm"><label>แหล่งซื้อ</label><input type="text" id="b-src" placeholder="Japan, Sister..."></div>
    <div class="fm"><label>วันที่ซื้อ</label><input type="date" id="b-date"></div>
    <div class="fm full"><label>ลิงก์ภาพ</label><input type="text" id="b-img" placeholder="https://..."></div>
    <div class="fm full"><label>หมายเหตุ</label><textarea id="b-note" rows="2"></textarea></div>
  </div>
  <div class="mf">
    <button class="btn bgh" onclick="closeOv('buy')">ยกเลิก</button>
    <button class="btn bg" id="buy-btn" onclick="saveBuy()">💾 บันทึก</button>
  </div>
</div>
</div>

<!-- MODAL: SELL -->
<div class="ov" id="ov-sell">
<div class="modal">
  <div class="mt2">บันทึกขายออก</div>
  <div class="fg">
    <div class="fm full"><label>เลือกสินค้า *</label>
      <select id="sl-item"><option value="">-- เลือกสินค้า --</option></select>
    </div>
    <div class="fm"><label>ราคาขาย (฿) *</label><input type="number" id="sl-price" placeholder="0"></div>
    <div class="fm"><label>ต้นทุน</label><input type="number" id="sl-cost" readonly style="opacity:.55"></div>
    <div class="fm"><label>ช่องทาง</label>
      <select id="sl-ch"><option>Luxsy</option><option>Openchat</option><option>Whosale</option><option>Live Boom</option><option>IG</option><option>หน้าร้าน</option><option>อื่นๆ</option></select>
    </div>
    <div class="fm"><label>ลูกค้า</label>
      <select id="sl-cust"><option value="">-- ไม่ระบุ --</option></select>
    </div>
    <div class="fm"><label>วันที่ขาย</label><input type="date" id="sl-date"></div>
    <div class="fm"><label>วันที่รับเงิน</label><input type="date" id="sl-paid"></div>
    <div class="fm full"><label>หมายเหตุ</label><textarea id="sl-note" rows="2"></textarea></div>
  </div>
  <div class="mf">
    <button class="btn bgh" onclick="closeOv('sell')">ยกเลิก</button>
    <button class="btn bg" id="sell-btn" onclick="saveSell()">💾 บันทึก</button>
  </div>
</div>
</div>

<!-- MODAL: CUSTOMER -->
<div class="ov" id="ov-cust">
<div class="modal">
  <div class="mt2" id="cust-ttl">เพิ่มลูกค้า</div>
  <input type="hidden" id="c-eid">
  <div class="fg">
    <div class="fm"><label>ชื่อ *</label><input type="text" id="c-name"></div>
    <div class="fm"><label>เบอร์โทร</label><input type="text" id="c-phone"></div>
    <div class="fm"><label>Line ID</label><input type="text" id="c-line"></div>
    <div class="fm"><label>ช่องทาง</label>
      <select id="c-ch"><option>Line</option><option>Facebook</option><option>IG</option><option>Openchat</option><option>หน้าร้าน</option></select>
    </div>
    <div class="fm full"><label>หมายเหตุ</label><textarea id="c-note" rows="2"></textarea></div>
  </div>
  <div class="mf">
    <button class="btn bgh" onclick="closeOv('cust')">ยกเลิก</button>
    <button class="btn bg" id="cust-btn" onclick="saveCust()">💾 บันทึก</button>
  </div>
</div>
</div>

<script>
// ============================================================
// STATE & CONFIG
// ============================================================
let API = localStorage.getItem('lv_api') || '';
let items=[], sells=[], custs=[], cur='db';

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const today = () => new Date().toISOString().split('T')[0];
const fmt = n => Number(n||0).toLocaleString('th-TH');
const daysAgo = d => d ? Math.floor((Date.now()-new Date(d))/864e5) : 0;

// ============================================================
// SETUP

function setMsg(m,c){ const e=document.getElementById('smsg'); e.textContent=m; e.style.color=c; }

async function testSave(){
  const url = document.getElementById('api-url').value.trim();
  if(!url){ setMsg('กรุณากรอก URL','var(--red)'); return; }
  setMsg('⏳ กำลังทดสอบ...','var(--txm)');
  try {
    const res = await callAPI(url, 'ping', '', '');
    if(res && res.ok){
      API = url;
      localStorage.setItem('lv_api', url);
      setMsg('✅ เชื่อมต่อสำเร็จ! กำลังเปิดแอป...','var(--grn)');
      setTimeout(startApp, 800);
    } else {
      setMsg('❌ ' + (res ? res.error : 'ไม่มีการตอบกลับ'), 'var(--red)');
    }
  } catch(e) {
    setMsg('❌ เชื่อมต่อไม่ได้: ' + e.message, 'var(--red)');
  }
}

function skipSetup(){ startApp(); }
function resetURL(){
  document.getElementById('setup').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('api-url').value=API;
  setMsg('','');
}
function startApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  loadAll();
}

window.addEventListener('DOMContentLoaded', () => {
  if(API){ document.getElementById('api-url').value=API; startApp(); }
});

// ============================================================
// API LAYER — GET only (แก้ CORS ของ Apps Script)
// ============================================================
async function callAPI(baseUrl, action, type, extra){
  let url = `${baseUrl}?action=${action}`;
  if(type) url += `&type=${type}`;
  if(extra) url += `&${extra}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

const apiGet = (type) => callAPI(API, 'getAll', type, '');
const apiAdd = (type, data) => callAPI(API, 'add', type, 'data=' + b64(data));
const apiUpd = (type, id, data) => callAPI(API, 'update', type, 'id=' + id + '&data=' + b64(data));
const apiDel = (type, id) => callAPI(API, 'delete', type, 'id=' + id);

// encode base64 รองรับภาษาไทยและ Unicode ทุกตัว
function b64(obj) {
  const str = JSON.stringify(obj);
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return encodeURIComponent(btoa(bin));
}

// ============================================================
// SYNC
// ============================================================
function setSS(s){
  const d=document.getElementById('dot'), l=document.getElementById('lbl');
  if(!d) return;
  d.className='sdot';
  if(s==='ok'){ l.textContent='เชื่อมต่อแล้ว'; }
  else if(s==='sync'){ d.classList.add('spin'); l.textContent='กำลังซิงค์...'; }
  else { d.classList.add('err'); l.textContent='เชื่อมต่อไม่ได้'; }
}

async function loadAll(){
  setSS('sync');
  try {
    const [ri,rs,rc] = await Promise.all([apiGet('items'), apiGet('sells'), apiGet('customers')]);
    items = ri.ok ? ri.data : [];
    sells = rs.ok ? rs.data : [];
    custs = rc.ok ? rc.data : [];
    setSS('ok');
    renderCurrent();
  } catch(e) {
    setSS('err');
    console.error(e);
  }
}

function renderCurrent(){
  if(cur==='db') renderDB();
  if(cur==='stock') renderStock();
  if(cur==='buy') renderBuy();
  if(cur==='sell') renderSell();
  if(cur==='cust') renderCust();
}

// ============================================================
// NAVIGATION
// ============================================================
function go(name, el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb,.mb2').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  el.classList.add('active');
  const txt = el.textContent.replace(/[📊👜🛒💳👤]/g,'').trim();
  document.querySelectorAll('.nb,.mb2').forEach(b=>{
    if(b!==el && b.textContent.replace(/[📊👜🛒💳👤]/g,'').trim()===txt) b.classList.add('active');
  });
  cur = name;
  renderCurrent();
}

// ============================================================
// HELPERS
// ============================================================
function chip(b){
  const m = {'chanel':'cc','lv':'cl','hermes':'ch2','hermès':'ch2','gucci':'cg2','dior':'cd','rolex':'crx','prada':'cp','celine':'ce','céline':'ce'};
  return `<span class="chip ${m[(b||'').toLowerCase()]||'cx'}">${b||'-'}</span>`;
}
function sBadge(s){
  if(s==='available') return `<span class="badge ba">มีสินค้า</span>`;
  if(s==='sold') return `<span class="badge bs">ขายแล้ว</span>`;
  if(s==='reserved') return `<span class="badge br2">จอง</span>`;
  return `<span class="badge">${s||'-'}</span>`;
}

function renderDB(){
  const av = items.filter(i=>i.status==='available');
  const rev = sells.reduce((a,s)=>a+Number(s.price||0),0);
  const cost = sells.reduce((a,s)=>a+Number(s.cost||0),0);
  const gp = rev-cost;
  document.getElementById('db-c').innerHTML = `
    <div class="sc"><div class="sl">สินค้าคงเหลือ</div><div class="sv">${av.length}</div><div class="ss">ทุน ฿${fmt(av.reduce((a,i)=>a+Number(i.cost||0),0))}</div></div>
    <div class="sc"><div class="sl">ขายแล้ว</div><div class="sv">${sells.length}</div><div class="ss">รายการ</div></div>
    <div class="sc"><div class="sl">ยอดขายรวม</div><div class="sv">฿${fmt(rev)}</div></div>
    <div class="sc"><div class="sl">กำไรสุทธิ</div><div class="sv ${gp>=0?'sg':'sr'}">฿${fmt(gp)}</div></div>`;

  const chs = ['Luxsy','Openchat','Whosale','Live Boom','IG','หน้าร้าน'];
  document.getElementById('db-ch').innerHTML = chs.map(ch=>{
    const cs = sells.filter(s=>s.channel===ch);
    if(!cs.length) return '';
    const r = cs.reduce((a,s)=>a+Number(s.price||0),0);
    const c2 = cs.reduce((a,s)=>a+Number(s.cost||0),0);
    return `<div class="chc"><div class="chn">${ch}</div><div class="chp">฿${fmt(r-c2)}</div><div class="chct">${cs.length} ชิ้น · ฿${fmt(r)}</div></div>`;
  }).filter(Boolean).join('') || '<div style="color:var(--txm);font-size:13px">ยังไม่มีข้อมูลการขาย</div>';

  const stale = av.filter(i=>daysAgo(i.buyDate)>60).sort((a,b)=>daysAgo(b.buyDate)-daysAgo(a.buyDate));
  document.getElementById('db-st').innerHTML = stale.length
    ? `<div class="ts"><table><thead><tr><th>Brand</th><th>ชื่อสินค้า</th><th>ราคาทุน</th><th>ราคาขาย</th><th>ค้างมา</th></tr></thead><tbody>
        ${stale.map(i=>`<tr class="stale"><td>${chip(i.brand)}</td><td><span class="sdoti"></span>${i.name}</td><td>฿${fmt(i.cost)}</td><td>฿${fmt(i.price)}</td><td><span class="badge bw">${daysAgo(i.buyDate)} วัน</span></td></tr>`).join('')}
       </tbody></table></div>`
    : '<div class="empty"><div class="ei">✅</div><p>ไม่มีสินค้าค้างนาน</p></div>';
}

  let f = items;
  if(q) f = f.filter(i=>(i.name+i.brand+i.serial+i.color+'').toLowerCase().includes(q));
  if(fb2) f = f.filter(i=>i.brand===fb2);
  if(fst2) f = f.filter(i=>i.status===fst2);

      return `<tr class="${st?'stale':''}"><td>${chip(i.brand)}</td>
        <td><strong>${i.name}</strong>${st?` <span class="badge bw" style="font-size:10px">${daysAgo(i.buyDate)}วัน</span>`:''}</td>

async function saveBuy(){
  const name = document.getElementById('b-name').value.trim();
  const cost = document.getElementById('b-cost').value;
  const price = document.getElementById('b-price').value;
  if(!name||!cost||!price){ alert('กรุณากรอกชื่อสินค้า, ราคาทุน และราคาขาย'); return; }
  const btn = document.getElementById('buy-btn');
  btn.disabled=true; btn.textContent='⏳ กำลังบันทึก...';
  const eid = document.getElementById('buy-eid').value;
  const ex = eid ? items.find(i=>i.id===eid) : null;
  const d = {
    id: eid||uid(), brand: document.getElementById('b-brand').value, name,
    itemType: document.getElementById('b-type').value, size: document.getElementById('b-size').value,
    condition: document.getElementById('b-cond').value, percent: document.getElementById('b-pct').value,
    year: document.getElementById('b-year').value, serial: document.getElementById('b-serial').value,
    color: document.getElementById('b-color').value, accessories: document.getElementById('b-acc').value,
    cost, price, source: document.getElementById('b-src').value,
    buyDate: document.getElementById('b-date').value, imgUrl: document.getElementById('b-img').value,
    note: document.getElementById('b-note').value,
    status: ex ? ex.status : 'available',
    createdAt: ex ? ex.createdAt : Date.now().toString()
  };
  try {
    const res = eid ? await apiUpd('items',eid,d) : await apiAdd('items',d);
    if(!res.ok) throw new Error(res.error||'error');
    if(eid){ const idx=items.findIndex(i=>i.id===eid); if(idx!==-1) items[idx]=d; }
    else items.unshift(d);
    closeOv('buy'); renderCurrent(); renderDB();
  } catch(e){ alert('บันทึกไม่สำเร็จ: '+e.message); }
  btn.disabled=false; btn.textContent='💾 บันทึก';
}

async function delItem(id){
  if(!confirm('ยืนยันการลบสินค้านี้?')) return;
  try {
    await apiDel('items',id);
    items = items.filter(i=>i.id!==id);
    renderCurrent(); renderDB();
  } catch(e){ alert('ลบไม่สำเร็จ'); }
}

// SELL MODAL
// ============================================================
function openSell(){
  const av = items.filter(i=>i.status==='available');
  document.getElementById('sl-item').innerHTML = '<option value="">-- เลือกสินค้า --</option>' +
    av.map(i=>`<option value="${i.id}">${i.brand} — ${i.name} (฿${fmt(i.price)})</option>`).join('');
  document.getElementById('sl-cust').innerHTML = '<option value="">-- ไม่ระบุ --</option>' +
    custs.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('sl-item').onchange = function(){
    const it = items.find(i=>i.id===this.value);
    if(it){ document.getElementById('sl-price').value=it.price; document.getElementById('sl-cost').value=it.cost; }
  };
  document.getElementById('sl-date').value = today();
  document.getElementById('sl-paid').value = today();
  ['sl-price','sl-cost','sl-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ov-sell').classList.add('open');
}

async function saveSell(){
  const itemId = document.getElementById('sl-item').value;
  const price = document.getElementById('sl-price').value;
  if(!itemId||!price){ alert('กรุณาเลือกสินค้าและกรอกราคาขาย'); return; }
  const btn = document.getElementById('sell-btn');
  btn.disabled=true; btn.textContent='⏳ กำลังบันทึก...';
  const it = items.find(i=>i.id===itemId);
  const custId = document.getElementById('sl-cust').value;
  const cu = custs.find(c=>c.id===custId);
  const s = {
    id: uid(), itemId, itemName: it?it.name:'', itemBrand: it?it.brand:'',
    price, cost: it?it.cost:'0', channel: document.getElementById('sl-ch').value,
    customerId: custId, customerName: cu?cu.name:'',
    sellDate: document.getElementById('sl-date').value,
    paidDate: document.getElementById('sl-paid').value,
    note: document.getElementById('sl-note').value,
    createdAt: Date.now().toString()
  };
  try {
    const res = await apiAdd('sells', s);
    if(!res.ok) throw new Error(res.error||'error');
    sells.unshift(s);
    const upd = {...it, status:'sold'};
    await apiUpd('items', itemId, upd);
    const idx = items.findIndex(i=>i.id===itemId);
    if(idx!==-1) items[idx].status = 'sold';
    closeOv('sell'); renderCurrent(); renderDB();
  } catch(e){ alert('บันทึกไม่สำเร็จ: '+e.message); }
  btn.disabled=false; btn.textContent='💾 บันทึก';
}

function renderSell(){
  const q = (document.querySelector('#s-sell .sb')||{value:''}).value.toLowerCase();
  const fch2 = document.getElementById('fch').value;
  let f = sells;
  if(q) f = f.filter(s=>(s.itemName+s.itemBrand+s.customerName+'').toLowerCase().includes(q));
  if(fch2) f = f.filter(s=>s.channel===fch2);
  document.getElementById('ct-sell').textContent = f.length + ' รายการ';
  if(!f.length){ document.getElementById('t-sell').innerHTML=`<div class="empty"><div class="ei">💳</div><p>ยังไม่มีรายการขาย</p></div>`; return; }
  const s = [...f].sort((a,b)=>Number(b.createdAt)-Number(a.createdAt));
  document.getElementById('t-sell').innerHTML = `<table>
    <thead><tr><th>วันที่ขาย</th><th>Brand</th><th>สินค้า</th><th>ช่องทาง</th><th>ลูกค้า</th><th>ราคาขาย</th><th>ต้นทุน</th><th>กำไร</th><th>รับเงิน</th><th></th></tr></thead>
    <tbody>${s.map(sl=>{
      const p = Number(sl.price||0)-Number(sl.cost||0);
      return `<tr><td>${sl.sellDate||'-'}</td><td>${chip(sl.itemBrand)}</td><td>${sl.itemName||'-'}</td>
        <td><span class="badge" style="background:var(--sf3);color:var(--txs)">${sl.channel||'-'}</span></td>
        <td>${sl.customerName||'-'}</td><td>฿${fmt(sl.price)}</td><td>฿${fmt(sl.cost)}</td>
        <td class="${p>=0?'sg':'sr'}">฿${fmt(p)}</td>
        <td style="font-size:11px;color:var(--txm)">${sl.paidDate||'-'}</td>
        <td><button class="bd2" onclick="delSell('${sl.id}')">ลบ</button></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

async function delSell(id){
  if(!confirm('ยืนยันการลบรายการขาย?')) return;
  const s = sells.find(x=>x.id===id);
  if(s&&s.itemId){
    const it = items.find(i=>i.id===s.itemId);
    if(it){ await apiUpd('items',it.id,{...it,status:'available'}); it.status='available'; }
  }
  await apiDel('sells', id);
  sells = sells.filter(x=>x.id!==id);
  renderCurrent(); renderDB();
}

  const btn = document.getElementById('cust-btn'); btn.disabled=true;

    note: document.getElementById('c-note').value,
    createdAt: ex ? ex.createdAt : Date.now().toString()
  };
  try {
    const res = eid ? await apiUpd('customers',eid,d) : await apiAdd('customers',d);
    if(!res.ok) throw new Error(res.error||'error');
    if(eid){ const idx=custs.findIndex(c=>c.id===eid); if(idx!==-1) custs[idx]=d; }
    else custs.unshift(d);
    closeOv('cust'); renderCust();
  } catch(e){ alert('บันทึกไม่สำเร็จ: '+e.message); }
  btn.disabled=false;
}

function renderCust(){
  const q = (document.querySelector('#s-cust .sb')||{value:''}).value.toLowerCase();
  let f = custs; if(q) f = f.filter(c=>(c.name+c.phone+'').toLowerCase().includes(q));
  document.getElementById('ct-cust').textContent = f.length + ' คน';
  if(!f.length){ document.getElementById('t-cust').innerHTML=`<div class="empty"><div class="ei">👤</div><p>ยังไม่มีลูกค้า</p></div>`; return; }
  document.getElementById('t-cust').innerHTML = `<table>
    <thead><tr><th>ชื่อ</th><th>เบอร์</th><th>Line</th><th>ช่องทาง</th><th>ซื้อ</th><th>ยอดรวม</th><th>ล่าสุด</th><th>หมายเหตุ</th><th></th></tr></thead>
    <tbody>${f.map(c=>{
      const cs = sells.filter(s=>s.customerId===c.id);
      const tot = cs.reduce((a,s)=>a+Number(s.price||0),0);
      const last = [...cs].sort((a,b)=>Number(b.createdAt)-Number(a.createdAt))[0];
      return `<tr><td><strong>${c.name}</strong></td><td>${c.phone||'-'}</td><td>${c.lineId||'-'}</td>
        <td><span class="badge" style="background:var(--sf3);color:var(--txs)">${c.channel||'-'}</span></td>
        <td>${cs.length}</td><td class="${tot>0?'sg':''}">฿${fmt(tot)}</td>
        <td style="font-size:11px;color:var(--txm)">${last?last.sellDate:'-'}</td>
        <td style="font-size:11px;color:var(--txm)">${c.note||'-'}</td>
        <td><div class="tda"><button class="be2" onclick="openCust('${c.id}')">แก้ไข</button><button class="bd2" onclick="delCust('${c.id}')">ลบ</button></div></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

async function delCust(id){
  if(!confirm('ลบลูกค้านี้?')) return;
  await apiDel('customers', id);
  custs = custs.filter(c=>c.id!==id);
  renderCust();
}

// Close modal on backdrop click
function closeOv(t){ document.getElementById('ov-'+t).classList.remove('open'); }
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeOv(o.id.replace('ov-',''));}));
</script>
</body>
